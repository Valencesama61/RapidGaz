spring.application.name=RapidGaz
spring.config.import=optional:classpath:application-local.properties

# Base de données
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.org.hibernate=WARN

# JWT - clé secrète et durées d'expiration
security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=3600000
# Refresh token (7 jours)
security.jwt.refresh-expiration-time=604800000

# CORS - origines autorisées (séparées par une virgule si plusieurs)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Super Admin - credentials injectés au démarrage
app.super-admin.email=${SUPER_ADMIN_EMAIL}
app.super-admin.password=${SUPER_ADMIN_PASSWORD}
app.super-admin.name=${SUPER_ADMIN_NAME}
