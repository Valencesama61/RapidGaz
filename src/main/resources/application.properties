spring.application.name=RapidGaz
spring.config.import=optional:classpath:application-local.properties

# Base de données
spring.datasource.url=jdbc:postgresql://localhost:5432/gas_db
spring.datasource.username=sama_pgsql
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.hibernate.engine.jdbc.env.internal.JdbcEnvironmentInitiator=DEBUG

# JWT — clé secrète et durées d'expiration
security.jwt.secret-key=${JWT_SECRET}
security.jwt.expiration-time=3600000
# Refresh token (7 jours)
security.jwt.refresh-expiration-time=604800000

# CORS — origines autorisées (séparées par une virgule si plusieurs)
app.cors.allowed-origins=http://localhost:8005,http://localhost:3000

# Super Admin — credentials injectés au démarrage
app.super-admin.email=Sama00001@proton.me
app.super-admin.password=${SUPER_ADMIN_PASSWORD}
app.super-admin.name=Sama Admin
